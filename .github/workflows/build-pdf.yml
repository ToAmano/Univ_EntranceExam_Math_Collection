name: Build PDF Books

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { univ: titech, cat: kouki }
          - { univ: titech, cat: zenki }
          - { univ: utokyo, cat: kouki }
          - { univ: utokyo, cat: zenki }
          - { univ: ukyoto, cat: kouki }
          - { univ: ukyoto, cat: zenki }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-lang-japanese texlive-luatex \
            texlive-latex-extra texlive-latex-recommended \
            texlive-pictures texlive-science texlive-fonts-extra \
            latexmk

      - name: Regenerate main.tex
        run: python3 scratch/generate_main_tex.py ${{ matrix.target.univ }}/${{ matrix.target.cat }}

      - name: Build ${{ matrix.target.univ }}/${{ matrix.target.cat }}/main.tex
        working-directory: src/${{ matrix.target.univ }}/${{ matrix.target.cat }}
        run: latexmk -lualatex -interaction=nonstopmode main.tex

      - name: Rename output PDF
        run: |
          mkdir -p dist-pdf
          cp "src/${{ matrix.target.univ }}/${{ matrix.target.cat }}/main.pdf" \
             "dist-pdf/${{ matrix.target.univ }}_${{ matrix.target.cat }}.pdf"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.univ }}_${{ matrix.target.cat }}
          path: dist-pdf/${{ matrix.target.univ }}_${{ matrix.target.cat }}.pdf

  release:
    needs: build-pdf
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all PDFs
        uses: actions/download-artifact@v4
        with:
          path: pdfs

      - name: Flatten artifact directories
        run: |
          mkdir -p release
          find pdfs -name "*.pdf" -exec cp {} release/ \;
          ls -la release

      - name: Create Release and Upload PDFs
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
